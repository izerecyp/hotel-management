
<html>
<head>

    <title>Grand Horizon Hotel - Create Account</title>
    <link rel="stylesheet" href="sign_up.css">
</head>
<body>

    <div class="signup-container">
        <div class="header">
            <h1>Unique Hotel</h1>
            <p>Join our loyalty program for exclusive rates</p>
        </div>

        <form action="#" method="POST">
            <div class="form-group">
                <label for="full-name">Full Name</label>
                <input type="text" id="full-name" name="name" placeholder="your full name" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="your email Address" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

           <!-- <div class="terms">
                <input type="checkbox" id="terms" required>
                <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>, and consent to receiving member discounts.</label>
            </div>-->

            <button type="submit" class="btn-submit">Create Account</button>
        </form>

        <div class="footer-text">
            Already have an account? <a href="login.html">Sign In</a>
        </div>
    </div>

</body>
</html>
