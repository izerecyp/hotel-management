<html>
<head>
    <title>Book a Table</title>
    <link rel="stylesheet" href="booking.css">
</head>
<body>
    <div class="form-container">
        <main class="booking-card">
            <div class="form-header">
                <h2>Reserve a Table</h2>
                <p>Please fill out the form to secure your reservation.</p>
            </div>
            
            <form action="#" method="POST">
                <div class="input-group">
                    <label for="full-name">Full Name</label>
                    <input type="text" id="full-name" name="name" placeholder="John Doe" required>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="john@example.com" required>
                    </div>
                    <div class="input-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" placeholder="+1 234 567 890" required>
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label for="date">Reservation Date</label>
                        <input type="date" id="date" name="date" required>
                    </div>
                    <div class="input-group">
                        <label for="time">Preferred Time</label>
                        <input type="time" id="time" name="time" required>
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label for="guests">Number of Guests</label>
                        <select id="guests" name="guests" required>
                            <option value="" disabled selected>Select guests</option>
                            <option value="1">1 Person</option>
                            <option value="2">2 People</option>
                            <option value="3">3 People</option>
                            <option value="4">4 People</option>
                            <option value="5-6">5-6 People</option>
                            <option value="7+">7+ People (Event)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="seating">Seating Preference</label>
                        <select id="seating" name="seating">
                            <option value="no-preference">No Preference</option>
                            <option value="indoor">Indoor</option>
                            <option value="outdoor">Outdoor / Terrace</option>
                            <option value="bar">Bar Area</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label for="requests">Special Requests (Optional)</label>
                    <textarea id="requests" name="requests" rows="3" placeholder="Allergies, high chair, birthday celebration..."></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-submit">Confirm Reservation</button>
                    <a href="index.html" class="btn-back">Go Back</a>
                </div>
            </form>
        </main>
    </div>
</body>
</html>
